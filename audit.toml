# cargo-audit configuration
# See: https://github.com/rustsec/rustsec/tree/main/cargo-audit
#
# Advisory Lifecycle Policy (M16-21 v0.116.0):
# Open advisory → triage (assess exploitability in the pg_ripple use-case) →
# ignore with an explicit expiry date (maximum 12 months) if not exploitable →
# quarterly review (re-examine on expiry; update reasoning or remove) →
# expiry forces re-decision: either extend with fresh rationale, fix upstream
# dependency, or treat as a blocker.  No advisory may be silently suppressed
# without a reason comment and an expires field.

[advisories]
# Pre-existing advisories acknowledged and triaged for v0.82.0 (RUSTSEC-01).
# These affect transitive dependencies only and are not exploitable in
# the pg_ripple use-case (server-side PostgreSQL extension with no untrusted
# external input to the affected code paths).
#
# DS13-02 / S13-04 (v0.86.0): expiry dates added to all ignores per audit policy.
# Review on each expiry; remove if the advisory has been patched upstream.
ignore = [
    # serde_cbor: unmaintained (replaced by ciborium).  No direct dep.
    # Status: still present as transitive dep; no upstream fix expected.
    # Expiry: 2027-01-01 — re-audit once ciborium migration is complete upstream.
    { id = "RUSTSEC-2021-0127", reason = "serde_cbor still present as transitive dep; no upstream fix expected", expires = "2027-01-01" },
    # rsa: timing side-channel in RSA decryption (Marvin attack).
    # pg_ripple does not use RSA decryption for external-party data.
    # SEC-M-01 (v0.123.0): Q3-2026 re-evaluation scheduled (GitHub issue #rsa-q3-2026).
    # Re-evaluated 2026-05-19: no upstream rsa crate patch available; RSA still not used
    # for untrusted external input in pg_ripple — RSA not used for untrusted input — re-evaluated Q3-2026.
    # Expiry extended to 2027-01-01; next mandatory review by 2026-10-01.
    { id = "RUSTSEC-2024-0436", reason = "RSA not used for untrusted external input in pg_ripple — re-evaluated Q3-2026", expires = "2027-01-01" },
    # rsa: PKCS#1 v1.5 timing side-channel (closely related to RUSTSEC-2024-0436).
    # Same mitigation applies: RSA not used for untrusted external input.
    # SEC-M-01 (v0.123.0): Q3-2026 re-evaluation scheduled (GitHub issue #rsa-q3-2026).
    # Re-evaluated 2026-05-19: no upstream rsa crate patch available; same RSA non-usage mitigation.
    # RSA not used for untrusted input — re-evaluated Q3-2026.
    # Expiry extended to 2027-01-01; next mandatory review by 2026-10-01.
    { id = "RUSTSEC-2023-0071", reason = "RSA not used for untrusted external input in pg_ripple — re-evaluated Q3-2026", expires = "2027-01-01" },
    # paste: proc-macro crate unsoundness (RUSTSEC-2026-0104).
    # SEC-M-02 (v0.123.0): Advisory verified as compile-time-only unsoundness.
    # `paste` is a procedural macro crate used exclusively at compile time to concatenate
    # identifiers during code generation. The unsoundness manifests only when the proc-macro
    # itself is compiled (at build time), not when the generated code runs at runtime.
    # Runtime impact assessment: NONE — the generated Rust code does not inherit any unsound
    # behavior from the macro implementation. The proc-macro binary is not shipped or deployed;
    # only the generated code artifacts are included in the pg_ripple binary.
    # Verification: reviewed RUSTSEC-2026-0104 advisory text and paste macro source; confirmed
    # the issue is in macro expansion internals with no observable effect on generated output.
    # No upstream fixed version available as of 2026-05-19 review.
    # Expiry: 2027-01-01 — re-audit when paste releases a fixed version.
    { id = "RUSTSEC-2026-0104", reason = "paste is a compile-time proc-macro only; unsoundness is in macro internals with no runtime impact on generated code — verified 2026-05-19 (SEC-M-02)", expires = "2027-01-01" },
]

# pg_trgm: PostgreSQL contrib module used for fuzzy SPARQL (v0.87.0 CONF-SBOM-01)
# pg_trgm is a PostgreSQL extension (not a Rust crate) and is not tracked in cargo-audit.
# It is an optional runtime dependency: fuzzy SPARQL functions return an error when
# pg_trgm is not installed rather than failing silently.
# The module is included in postgresql-18-contrib on all supported platforms.
