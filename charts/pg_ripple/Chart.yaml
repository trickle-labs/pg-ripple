apiVersion: v2
name: pg-ripple
description: |
  A Helm chart for deploying pg_ripple — a high-performance RDF triple store with
  native SPARQL query execution — on Kubernetes. Bundles pg_ripple with pg_trickle,
  PostGIS, and pgvector in the batteries-included image.
type: application
version: 0.54.0
appVersion: "0.54.0"
keywords:
  - postgresql
  - rdf
  - sparql
  - triplestore
  - knowledge-graph
home: https://github.com/trickle-labs/pg-ripple
sources:
  - https://github.com/trickle-labs/pg-ripple
maintainers:
  - name: trickle-labs
    url: https://github.com/trickle-labs
