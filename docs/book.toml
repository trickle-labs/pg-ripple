[book]
title = "pg_ripple"
authors = ["pg_ripple contributors"]
src = "src"
language = "en"

[build]
build-dir = "book"

[preprocessor.admonish]
command = "mdbook-admonish"
optional = true
assets_version = "3.0.2"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/trickle-labs/pg-ripple"
edit-url-template = "https://github.com/trickle-labs/pg-ripple/edit/main/docs/src/{path}"

[output.html.search]
enable = true
limit-results = 20
use-boolean-and = true
