      - name: Run migration chain test
        run: bash tests/test_migration_chain.sh

      - name: Stop pgrx PostgreSQL 18
        if: always()
        run: cargo pgrx stop pg18

  w3c-smoke:
    name: W3C SPARQL 1.1 smoke subset (required)
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache cargo-pgrx binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: ${{ runner.os }}-cargo-pgrx-${{ env.PGRX_VERSION }}

      - name: Cache pgrx PostgreSQL build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.pgrx
          key: ${{ runner.os }}-pgrx-pg18-${{ env.PGRX_VERSION }}

      - name: Cache W3C test data
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        id: w3c-cache
        with:
          path: tests/w3c/data
          key: w3c-sparql11-${{ hashFiles('scripts/fetch_w3c_tests.sh') }}

      - name: Install PostgreSQL 18 from PGDG
        run: |
          sudo apt-get install -y --no-install-recommends curl ca-certificates lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc >/dev/null
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libclang-dev clang lld \
            postgresql-18 postgresql-server-dev-18
          sudo chown -R "$USER" \
            /usr/share/postgresql/18/extension \
            /usr/lib/postgresql/18/lib

      - name: Install cargo-pgrx
        run: |
          if ! cargo pgrx --version 2>/dev/null | grep -q "${{ env.PGRX_VERSION }}"; then
            cargo install cargo-pgrx --version "=${{ env.PGRX_VERSION }}" --locked
          fi

      - name: Initialise pgrx (PostgreSQL 18)
        run: cargo pgrx init --pg18 /usr/lib/postgresql/18/bin/pg_config

      - name: Fetch W3C SPARQL 1.1 test suite
        if: steps.w3c-cache.outputs.cache-hit != 'true'
        run: bash scripts/fetch_w3c_tests.sh || echo "W3C download failed — tests will skip"

      - name: Start pgrx PostgreSQL 18
        run: cargo pgrx start pg18 --postgresql-conf "allow_system_table_mods=on"

      - name: Install pg_ripple
        run: cargo pgrx install --pg-config /usr/lib/postgresql/18/bin/pg_config

      - name: Run W3C smoke subset
        env:
          PGHOST: localhost
          PGPORT: "28818"
          PGDATABASE: postgres
          PGUSER: runner
        run: cargo test --test w3c_smoke -- --nocapture

      - name: Stop pgrx PostgreSQL 18
        if: always()
        run: cargo pgrx stop pg18

  w3c-suite:
    name: W3C SPARQL 1.1 full suite (required)
    runs-on: ubuntu-latest
    needs: [test]
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
