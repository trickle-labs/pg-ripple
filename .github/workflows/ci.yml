  # BUILD-01 (v0.91.0): Version sync lint — all version sources must agree.
  lint-version-sync:
    name: Lint — version sync across Cargo/control/HTTP (BUILD-01, v0.91.0)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Check version consistency
        run: |
          set -euo pipefail

          # Extension Cargo.toml
          EXT_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          # pg_ripple.control
          CTL_VER=$(grep '^default_version' pg_ripple.control | sed "s/.*'\(.*\)'.*/\1/")
          # pg_ripple_http Cargo.toml
          HTTP_VER=$(grep '^version' pg_ripple_http/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          # COMPATIBLE_EXTENSION_MIN in pg_ripple_http/src/main.rs
          COMPAT_MIN=$(grep 'COMPATIBLE_EXTENSION_MIN' pg_ripple_http/src/main.rs | grep -oP '"[0-9]+\.[0-9]+\.[0-9]+"' | tr -d '"')

          echo "Extension Cargo.toml : ${EXT_VER}"
          echo "pg_ripple.control    : ${CTL_VER}"
          echo "pg_ripple_http       : ${HTTP_VER}"
          echo "COMPATIBLE_EXT_MIN   : ${COMPAT_MIN}"

          FAIL=0
          if [[ "${EXT_VER}" != "${CTL_VER}" ]]; then
            echo "::error::Version mismatch: Cargo.toml (${EXT_VER}) != pg_ripple.control (${CTL_VER})"
            FAIL=1
          fi
          if [[ "${EXT_VER}" != "${HTTP_VER}" ]]; then
            echo "::error::Version mismatch: Cargo.toml (${EXT_VER}) != pg_ripple_http/Cargo.toml (${HTTP_VER})"
            FAIL=1
          fi
          # COMPATIBLE_EXTENSION_MIN must be <= EXT_VER (semver check via sort)
          LOWEST=$(printf '%s\n%s' "${COMPAT_MIN}" "${EXT_VER}" | sort -V | head -1)
          if [[ "${LOWEST}" != "${COMPAT_MIN}" ]]; then
            echo "::error::COMPATIBLE_EXTENSION_MIN (${COMPAT_MIN}) is higher than extension version (${EXT_VER})"
            FAIL=1
          fi
          if [[ "${FAIL}" -eq 1 ]]; then
            exit 1
          fi
          echo "All version sources are in sync."

  # v0.51.0: SPDX licence compliance gate
  lint-spdx-license:
    name: Lint - SPDX licence compliance (v0.51.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - name: Install cargo-license
        run: cargo install cargo-license --locked
      - name: Check all dependencies use allowed licences
        run: |
          ALLOWED="MIT Apache-2.0 Apache-2.0 WITH LLVM-exception BSD-2-Clause BSD-3-Clause ISC Unicode-DFS-2016 Unicode-3.0 OpenSSL CC0-1.0 Zlib CDLA-Permissive-2.0 BSL-1.0"
          cargo license --json 2>/dev/null | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          allowed = set(sys.argv[1:])
          failures = []
          for pkg in data:
              lic = pkg.get('license', 'UNKNOWN')
              # Accept conjunctions that are subsets of allowed (e.g. 'MIT OR Apache-2.0')
              parts = [p.strip() for p in lic.replace(' AND ', ' OR ').split(' OR ')]
              if not any(p in allowed for p in parts):
                  failures.append(f\"{pkg['name']}@{pkg['version']}: {lic}\")
          if failures:
              print('Disallowed licences found:')
              for f in failures:
                  print(' ', f)
              sys.exit(1)
          print(f'All {len(data)} dependencies use allowed licences.')
          " $ALLOWED

  # v0.83.0 CHANGELOG-FMT-01 / CHANGELOG-BREAK-01: CHANGELOG format and BREAKING tag lint
  lint-changelog:
    name: Lint — CHANGELOG format and BREAKING tags (v0.83.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Validate CHANGELOG.md headings and BREAKING tags
        run: |
          python3 - <<'EOF'
          import re, sys

          with open("CHANGELOG.md") as f:
              lines = f.readlines()

          errors = []

          # Rule 1: Every ## heading must be either [Unreleased] or a version
          #         in the form ## [X.Y.Z] – YYYY-MM-DD
          version_re = re.compile(
              r'^## \[(Unreleased|\d+\.\d+\.\d+)\]( – \d{4}-\d{2}-\d{2})?'
          )

          # Rule 2: Any line containing the word BREAKING must use the exact tag
          #         **BREAKING:** at the start of a list item or paragraph.
          breaking_re = re.compile(r'(?i)\bbreaking changes?\b')
          valid_breaking = re.compile(r'\*\*BREAKING:\*\*|\bno breaking\b|\bno-breaking\b')

          for i, line in enumerate(lines, 1):
              if line.startswith("## ") and not version_re.match(line):
                  errors.append(f"L{i}: malformed version heading: {line.rstrip()}")
              if breaking_re.search(line) and not valid_breaking.search(line):
                  # Ignore comment lines and the format documentation itself
                  stripped = line.strip()
                  if not stripped.startswith('#') and 'BREAKING' not in stripped[:3]:
                      errors.append(
                          f"L{i}: 'breaking' found but not tagged **BREAKING:** — {stripped[:80]}"
                      )

          if errors:
              print("CHANGELOG lint failures:")
              for e in errors:
                  print(" ", e)
              sys.exit(1)
          print(f"CHANGELOG.md lint passed ({len(lines)} lines checked).")
          EOF

  # v0.67.0 GATE-02: Validate feature_status() evidence after each CI run.
  validate-feature-status:
    name: Validate feature status evidence (v0.67.0)
    needs: [test, regress]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends curl ca-certificates lsb-release
          curl https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libclang-dev clang lld python3 \
            postgresql-18 postgresql-server-dev-18
          sudo chown -R "$USER" \
            /usr/share/postgresql/18/extension \
            /usr/lib/postgresql/18/lib

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-pgrx
          key: ${{ runner.os }}-cargo-pgrx-gate02-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-pgrx-gate02-

      - name: Install cargo-pgrx
        run: |
          if ! command -v cargo-pgrx &>/dev/null; then
            cargo install cargo-pgrx --version "=${{ env.PGRX_VERSION }}" --locked
          fi

      - name: Build and install extension
        run: |
          PG_CONFIG=/usr/lib/postgresql/18/bin/pg_config
          cargo pgrx init --pg18 "$PG_CONFIG"
          cargo pgrx start pg18 --postgresql-conf "allow_system_table_mods=on"
          cargo pgrx install --pg-config "$PG_CONFIG"

      - name: Verify feature_status() evidence paths exist
        env:
          PGHOST: localhost
          PGPORT: "28818"
          PGDATABASE: postgres
          PGUSER: runner
        run: |
          psql -c "CREATE EXTENSION IF NOT EXISTS pg_ripple;" 2>&1
          # GATE-05: Collect all missing paths in a variable to avoid the
          # pipe-subshell bypass (writing to $GITHUB_ENV inside a while loop
          # does not affect the current step's env — CF-C fix).
          missing=$(psql -t -A -c "SELECT evidence_path FROM pg_ripple.feature_status() WHERE evidence_path IS NOT NULL;" \
            | while IFS= read -r path; do
                # Strip ': symbol_name' annotation to get the bare file path
                file_path="${path%%: *}"
                if [ -n "$file_path" ] && [ ! -e "$file_path" ]; then
                  echo "$path"
                fi
              done)
          if [ -n "$missing" ]; then
            echo "MISSING evidence paths:"
            echo "$missing"
            echo "Feature status evidence check failed — missing paths detected"
            exit 1
          fi
          echo "All feature_status() evidence paths verified"

      - name: Validate API drift (check_api_drift.py)
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          python3 scripts/check_api_drift.py --version "$VERSION"

      - name: Validate roadmap evidence (check_roadmap_evidence.py)
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          python3 scripts/check_roadmap_evidence.py --version "$VERSION"

      - name: Stop pgrx PostgreSQL 18
        if: always()
        run: cargo pgrx stop pg18 2>/dev/null || true

