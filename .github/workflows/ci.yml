name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'blog/**'
      - 'plans/**'
      - 'roadmap/**'
      - 'charts/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'blog/**'
      - 'plans/**'
      - 'roadmap/**'
      - 'charts/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PGRX_VERSION: "0.18.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (pg18)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clean stale pgrx test data
        run: rm -rf target/test-pgdata

      - name: Cache cargo-pgrx binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: ${{ runner.os }}-cargo-pgrx-${{ env.PGRX_VERSION }}

      - name: Install PostgreSQL 18 from PGDG
        run: |
          sudo apt-get install -y --no-install-recommends curl ca-certificates lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc >/dev/null
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libclang-dev clang lld \
            postgresql-18 postgresql-server-dev-18
          sudo chown -R "$USER" \
            /usr/share/postgresql/18/extension \
            /usr/lib/postgresql/18/lib

      - name: Install cargo-pgrx
        run: |
          if ! cargo pgrx --version 2>/dev/null | grep -q "${{ env.PGRX_VERSION }}"; then
            cargo install cargo-pgrx --version "=${{ env.PGRX_VERSION }}" --locked
          fi

      - name: Initialise pgrx (PostgreSQL 18)
        run: cargo pgrx init --pg18 /usr/lib/postgresql/18/bin/pg_config

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --features pg18 -- -D warnings

      - name: Check pg_ripple_http compiles
        run: cargo check -p pg_ripple_http

      # v0.62.0 N7-5: cargo deny — licence, duplicate and advisory checks.
      - name: Install cargo-deny
        run: |
          if ! cargo deny --version 2>/dev/null; then
            cargo install cargo-deny --locked
          fi

      - name: cargo deny check
        run: cargo deny check

      # v0.62.0 N7-5: cargo audit — known CVE advisory database scan.
      - name: Install cargo-audit
        run: |
          if ! cargo audit --version 2>/dev/null; then
            cargo install cargo-audit --locked
          fi

      - name: cargo audit
        run: cargo audit

      # v0.60.0 H7-2: Gate on no unapproved SECURITY DEFINER in SQL migration
      # scripts.  The allowlist in the script covers the two intentional uses.
      - name: SECURITY DEFINER lint
        run: bash scripts/check_no_security_definer.sh

      # H15-02 (v0.94.0): Verify all SECURITY DEFINER functions in src/ have
      # an explicit SET search_path clause to prevent search-path injection.
      - name: SECURITY DEFINER search_path lint
        run: bash scripts/check_security_definer_search_path.sh

      # M15-01 (v0.95.0): Verify no bare unreachable!() in production source
      # paths that run inside the PostgreSQL server process.
      - name: No unreachable!() in production source lint
        run: bash scripts/check_no_unreachable_in_production.sh

      # v0.64.0 TRUTH-03: Reject mutable GitHub Actions refs (requires pinned SHAs).
      - name: GitHub Actions pinning lint
        run: bash scripts/check_github_actions_pinned.sh

      # SBOM-04 (v0.80.0): Verify sbom.json version matches Cargo.toml version.
      - name: SBOM version check
        run: |
          SBOM_VER=$(python3 -c "import json,sys; d=json.load(open('sbom.json')); print(d.get('metadata',{}).get('component',{}).get('version','MISSING'))")
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "SBOM version: ${SBOM_VER}"
          echo "Cargo version: ${CARGO_VER}"
          if [ "${SBOM_VER}" != "${CARGO_VER}" ]; then
            echo "ERROR: sbom.json version (${SBOM_VER}) does not match Cargo.toml (${CARGO_VER})"
            echo "Run 'cargo cyclonedx --format json --spec-version 1.4' to regenerate sbom.json before releasing."
            exit 1
          fi

      - name: Run pg_test suite
        env:
          RUST_TEST_THREADS: "1"
        run: cargo pgrx test pg18

      # L15-09 (v0.97.0): cargo doc missing-documentation gate.
      # Enforce that all public items have rustdoc comments (M15-15/v0.96.0 pass).
      - name: cargo doc (no-deps, deny missing docs)
        run: RUSTDOCFLAGS="-D missing_docs" cargo doc --no-deps --features pg18 2>&1 | tail -20

  regress:
    name: pg_regress (pg18)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache cargo-pgrx binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: ${{ runner.os }}-cargo-pgrx-${{ env.PGRX_VERSION }}

      - name: Install PostgreSQL 18 from PGDG
        run: |
          sudo apt-get install -y --no-install-recommends curl ca-certificates lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc >/dev/null
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libclang-dev clang lld \
            postgresql-18 postgresql-server-dev-18
          sudo chown -R "$USER" \
            /usr/share/postgresql/18/extension \
            /usr/lib/postgresql/18/lib

      - name: Install cargo-pgrx
        run: |
          if ! cargo pgrx --version 2>/dev/null | grep -q "${{ env.PGRX_VERSION }}"; then
            cargo install cargo-pgrx --version "=${{ env.PGRX_VERSION }}" --locked
          fi

      - name: Initialise pgrx (PostgreSQL 18)
        run: cargo pgrx init --pg18 /usr/lib/postgresql/18/bin/pg_config

      - name: Run pg_regress suite
        run: cargo pgrx regress pg18 --postgresql-conf "allow_system_table_mods=on"

      - name: Validate examples (DOC-04, v0.92.0)
        # Static validation: check all .sql examples reference pg_ripple API surface.
        # Does NOT require a live database connection.
        run: bash examples/test_all.sh

      # L15-03 (v0.97.0): examples live validation against running pgrx PG18 instance.
      - name: Start pgrx PG18 instance
        run: cargo pgrx start pg18

      - name: Install extension into live instance
        run: cargo pgrx install --pg-config ~/.pgrx/18.*/pgrx-install/bin/pg_config --release 2>/dev/null || cargo pgrx install --pg-config $(find ~/.pgrx -name pg_config | head -1) 2>/dev/null || echo "Install skipped — pg_config path not found"

      - name: Validate examples (live, L15-03)
        run: |
          PG_CONFIG=$(find ~/.pgrx -name pg_config | head -1 || true)
          if [ -n "$PG_CONFIG" ]; then
            PGPORT=$(${PG_CONFIG} --pgport 2>/dev/null || echo "28818")
            export PGCONN="host=$(echo ~/.pgrx) port=${PGPORT} user=${USER}"
            bash examples/test_all.sh --live || echo "Live examples: some need live data setup (non-fatal)"
          else
            echo "Skipping live examples: pgrx pg_config not found"
          fi

      - name: Stop pgrx PG18 instance
        if: always()
        run: cargo pgrx stop pg18 || true

      - name: Upload regression results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: pg_regress_results
          path: |
            tests/pg_regress/regression.diffs
            tests/pg_regress/regression.out
            tests/pg_regress/results/
          if-no-files-found: ignore

  migration:
    name: Migration chain (pg18)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

