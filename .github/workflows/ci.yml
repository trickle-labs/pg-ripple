  # BUILD-01 (v0.84.0): Verify docker-compose.yml image tag matches Cargo.toml version.
  lint-docker-compose-version:
    name: Lint — docker-compose image tag currency (v0.84.0 BUILD-01)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
