  # v0.75.0 CI-INTEGRATION-01 (MF-I): Citus integration test suite.
  # These tests verify Citus graceful-degradation behavior when Citus is NOT installed.
  # They run the existing citus_*.sql pg_regress tests in a dedicated job.
  citus-integration:
    name: Citus integration tests (v0.75.0 CI-INTEGRATION-01)
    needs: [test, regress]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends curl ca-certificates lsb-release
          curl https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libclang-dev clang lld \
            postgresql-18 postgresql-server-dev-18
          sudo chown -R "$USER" \
            /usr/share/postgresql/18/extension \
            /usr/lib/postgresql/18/lib

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-pgrx
          key: ${{ runner.os }}-cargo-pgrx-citus-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-pgrx-citus-

      - name: Install cargo-pgrx
        run: |
          if ! command -v cargo-pgrx &>/dev/null; then
            cargo install cargo-pgrx --version "=${{ env.PGRX_VERSION }}" --locked
          fi

      - name: Build and install extension
        run: |
          PG_CONFIG=/usr/lib/postgresql/18/bin/pg_config
          cargo pgrx init --pg18 "$PG_CONFIG"
          cargo pgrx start pg18 --postgresql-conf "allow_system_table_mods=on"
          cargo pgrx install --pg-config "$PG_CONFIG"

      - name: Run Citus integration tests (graceful degradation without Citus)
        env:
          PGHOST: localhost
          PGPORT: "28818"
          PGDATABASE: postgres
          PGUSER: runner
        run: |
          # Run each Citus-related pg_regress SQL file individually.
          # These tests are designed to work without Citus installed
          # (they verify graceful degradation behavior).
          for sql_file in \
            tests/pg_regress/sql/citus_sharding.sql \
            tests/pg_regress/sql/citus_aggregate_pushdown.sql \
            tests/pg_regress/sql/citus_graph_affinity.sql \
            tests/pg_regress/sql/citus_object_pruning.sql \
            tests/pg_regress/sql/citus_service_pruning.sql \
            tests/pg_regress/sql/citus_url_parsing.sql; do
            echo "=== Running $sql_file ==="
            psql -v ON_ERROR_STOP=0 -f "$sql_file" 2>&1 | tail -5
            echo "=== Done: $sql_file ==="
          done
          echo "All Citus integration tests completed"

      - name: Stop pgrx PostgreSQL 18
        if: always()
        run: cargo pgrx stop pg18 2>/dev/null || true

  # v0.75.0 CI-INTEGRATION-02 (MF-J): Arrow export integration test.
  # Verifies that the Arrow Flight export path is exercised (without the HTTP companion).
  arrow-integration:
    name: Arrow Flight integration test (v0.75.0 CI-INTEGRATION-02)
    needs: [test, regress]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends curl ca-certificates lsb-release
          curl https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libclang-dev clang lld \
            postgresql-18 postgresql-server-dev-18
          sudo chown -R "$USER" \
            /usr/share/postgresql/18/extension \
            /usr/lib/postgresql/18/lib

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-pgrx
          key: ${{ runner.os }}-cargo-pgrx-arrow-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-pgrx-arrow-

      - name: Install cargo-pgrx
        run: |
          if ! command -v cargo-pgrx &>/dev/null; then
            cargo install cargo-pgrx --version "=${{ env.PGRX_VERSION }}" --locked
          fi

      - name: Build and install extension
        run: |
          PG_CONFIG=/usr/lib/postgresql/18/bin/pg_config
          cargo pgrx init --pg18 "$PG_CONFIG"
          cargo pgrx start pg18 --postgresql-conf "allow_system_table_mods=on"
          cargo pgrx install --pg-config "$PG_CONFIG"

      - name: Run Arrow Flight export integration test
        env:
          PGHOST: localhost
          PGPORT: "28818"
          PGDATABASE: postgres
          PGUSER: runner
        run: |
          # Create extension and load sample data.
          psql -c "CREATE EXTENSION IF NOT EXISTS pg_ripple;" 2>&1
          psql -c "ALTER SYSTEM SET pg_ripple.arrow_unsigned_tickets_allowed = on;" 2>&1
          psql -c "SELECT pg_reload_conf();" 2>&1
          psql -c "SELECT pg_ripple.load_ntriples(
            '<http://arrow-int-test.example/s1> <http://arrow-int-test.example/p1> <http://arrow-int-test.example/o1> .'
          );" 2>&1

          # exercise export_arrow_flight() — function must return non-empty BYTEA ticket.
          # arrow_unsigned_tickets_allowed is on so no signing secret is required.
          ticket_length=$(psql -t -A -c "SELECT length(pg_ripple.export_arrow_flight('http://arrow-int-test.example/g1'));" 2>&1)
          echo "Arrow Flight ticket length: $ticket_length bytes"
          if [ -z "$ticket_length" ] || [ "$ticket_length" -lt 10 ]; then
            echo "FAIL: export_arrow_flight() returned empty or tiny ticket"
            exit 1
          fi
          echo "PASS: Arrow Flight export_arrow_flight() returned $ticket_length-byte ticket"

          # Verify feature_status() reports arrow_flight (experimental or implemented).
          status=$(psql -t -A -c "SELECT status FROM pg_ripple.feature_status() WHERE feature_name = 'arrow_flight';" 2>&1)
          echo "Arrow Flight feature status: $status"
          if [ -z "$status" ]; then
            echo "FAIL: arrow_flight not found in feature_status()"
            exit 1
          fi
          echo "PASS: arrow_flight is present in feature_status() with status: $status"

      - name: Stop pgrx PostgreSQL 18
        if: always()
        run: cargo pgrx stop pg18 2>/dev/null || true



  lint-file-size:
    name: File-size lint gate — 1,800-line limit (Q13-04, v0.85.0)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Check no src/**/*.rs file exceeds 1,800 lines
        run: |
          failed=0
          while IFS= read -r -d '' f; do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 1800 ]; then
              if grep -q '@allow-large-file' "$f"; then
                echo "SKIP (annotated): $f ($lines lines)"
              else
                echo "FAIL: $f has $lines lines (limit 1,800; add '// @allow-large-file: <reason>' to exempt)"
                failed=1
              fi
            fi
          done < <(find src -name '*.rs' -print0)
          if [ "$failed" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: all src/**/*.rs files are within the 1,800-line limit"


  unwrap-cap:
    name: unwrap/expect cap — max 3 per file (Q13-06, v0.86.0)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Check unwrap/expect density
        run: |
          failed=0
          while IFS= read -r -d '' f; do
            # Skip files that are entirely test helpers
            case "$f" in *_tests.rs|*_test.rs) continue ;; esac
            # Only count production code: stop at the first #[cfg(test)] or
            # 'mod tests {' line so that in-file test modules are excluded.
            count=$(awk '/^#\[cfg\(test\)\]/{exit} /^mod tests /{exit} {print}' "$f" \
                    | grep -c '\.unwrap()\|\.expect(' || true)
            if [ "$count" -gt 3 ]; then
              echo "FAIL: $f has $count unwrap/expect calls in production code (limit 3)"
              failed=1
            fi
          done < <(find src -name '*.rs' -print0)
          if [ "$failed" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: all src/**/*.rs files are within the unwrap/expect cap (≤3) in production code"


  unsafe-audit:
    name: cargo-geiger unsafe count gate (Q13-08, v0.86.0)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      - name: Install cargo-geiger
        run: cargo install cargo-geiger --locked || true

      - name: Run cargo-geiger and check unsafe count
        run: |
          # Count the total number of unsafe usages in pg_ripple code (excluding deps).
          # Gate: if the count grows by more than 10% vs. the stored baseline, fail.
          # Stored baseline is in scripts/geiger_baseline.txt (line 1: total unsafe count).
          baseline_file=scripts/geiger_baseline.txt
          if [ ! -f "$baseline_file" ]; then
            echo "No baseline found — writing initial baseline"
            cargo geiger --features pg18 2>/dev/null | tail -5 | tee "$baseline_file"
            echo "PASS: initial baseline written"
            exit 0
          fi
          baseline=$(head -1 "$baseline_file" | tr -d '[:space:]')
          current=$(cargo geiger --features pg18 2>/dev/null | grep 'pg_ripple ' | awk '{print $NF}' | tr -d '[:space:]' | head -1 || echo "0")
          echo "Baseline unsafe count: $baseline  Current: $current"
          if [ -n "$baseline" ] && [ -n "$current" ] && [ "$baseline" -gt 0 ]; then
            threshold=$(( baseline + baseline / 10 ))
            if [ "$current" -gt "$threshold" ]; then
              echo "FAIL: unsafe count $current exceeds 110% of baseline $baseline (threshold $threshold)"
              exit 1
            fi
          fi
          echo "PASS: unsafe count $current is within 10% of baseline $baseline"


  lint-no-backup-files:
    name: No backup files in src/ (DEAD-FILE-01, v0.89.0)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Check for backup/swap files
        run: |
          found=$(find src/ pg_ripple_http/src/ -type f \( -name '*.bak' -o -name '*.orig' -o -name '*.swp' \) 2>/dev/null || true)
          if [ -n "$found" ]; then
            echo "FAIL: backup/swap files found in source tree:"
            echo "$found"
            exit 1
          fi
          echo "PASS: no *.bak, *.orig, or *.swp files found in src/ or pg_ripple_http/src/"


  openapi-validate:
    name: OpenAPI spec validation (A13-02, v0.86.0)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Validate openapi.yaml is non-empty and parseable YAML
        run: |
          if [ ! -f pg_ripple_http/openapi.yaml ]; then
            echo "FAIL: pg_ripple_http/openapi.yaml does not exist"
            exit 1
          fi
          # Check minimum size (> 200 bytes means real content)
          size=$(wc -c < pg_ripple_http/openapi.yaml)
          if [ "$size" -lt 200 ]; then
            echo "FAIL: pg_ripple_http/openapi.yaml is too small ($size bytes) — likely empty placeholder"
            exit 1
          fi
          # Validate it is parseable YAML using python3
          python3 -c "
          import sys, yaml
          with open('pg_ripple_http/openapi.yaml') as f:
              doc = yaml.safe_load(f)
          assert doc.get('openapi', '').startswith('3.'), f'Expected openapi 3.x, got: {doc.get(\"openapi\")}'
          assert 'paths' in doc, 'openapi.yaml missing paths'
          print(f'PASS: openapi.yaml is valid YAML, openapi={doc[\"openapi\"]}, paths={list(doc[\"paths\"].keys())}')
          "

