      - name: Install pg_ripple
        run: cargo pgrx install --pg-config /usr/lib/postgresql/18/bin/pg_config

      - name: Run W3C full suite (8 threads)
        env:
          PGHOST: localhost
          PGPORT: "28818"
          PGDATABASE: postgres
          PGUSER: runner
          W3C_THREADS: "8"
        run: cargo test --test w3c_suite -- --nocapture

      - name: Upload W3C test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: w3c_report
          path: tests/w3c/report.json
          if-no-files-found: ignore

      - name: Stop pgrx PostgreSQL 18
        if: always()
        run: cargo pgrx stop pg18

