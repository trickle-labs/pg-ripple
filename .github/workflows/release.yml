name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PGRX_VERSION: "0.18.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Full test suite (same checks as CI) ───────────────────────────────────
  test:
    name: Test (pg18)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache cargo-pgrx binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: ${{ runner.os }}-cargo-pgrx-${{ env.PGRX_VERSION }}

      - name: Install PostgreSQL 18 from PGDG
        run: |
          sudo apt-get install -y --no-install-recommends curl ca-certificates lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc >/dev/null
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libclang-dev clang lld \
            postgresql-18 postgresql-server-dev-18
          sudo chown -R "$USER" \
            /usr/share/postgresql/18/extension \
            /usr/lib/postgresql/18/lib

      - name: Install cargo-pgrx
        run: |
          if ! cargo pgrx --version 2>/dev/null | grep -q "${{ env.PGRX_VERSION }}"; then
            cargo install cargo-pgrx --version "=${{ env.PGRX_VERSION }}" --locked
          fi

      - name: Initialise pgrx (PostgreSQL 18)
        run: cargo pgrx init --pg18 /usr/lib/postgresql/18/bin/pg_config

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --features pg18 -- -D warnings

      - name: Run pg_test suite
        env:
          RUST_TEST_THREADS: "1"
        run: cargo pgrx test pg18

  # ── 2. pg_regress suite ──────────────────────────────────────────────────────
  regress:
    name: pg_regress (pg18)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache cargo-pgrx binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: ${{ runner.os }}-cargo-pgrx-${{ env.PGRX_VERSION }}

      - name: Install PostgreSQL 18 from PGDG
        run: |
          sudo apt-get install -y --no-install-recommends curl ca-certificates lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc >/dev/null
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libclang-dev clang lld \
            postgresql-18 postgresql-server-dev-18
          sudo chown -R "$USER" \
            /usr/share/postgresql/18/extension \
            /usr/lib/postgresql/18/lib

      - name: Install cargo-pgrx
        run: |
          if ! cargo pgrx --version 2>/dev/null | grep -q "${{ env.PGRX_VERSION }}"; then
            cargo install cargo-pgrx --version "=${{ env.PGRX_VERSION }}" --locked
          fi

      - name: Initialise pgrx (PostgreSQL 18)
        run: cargo pgrx init --pg18 /usr/lib/postgresql/18/bin/pg_config

      - name: Run pg_regress suite
        run: cargo pgrx regress pg18 --postgresql-conf "allow_system_table_mods=on"

  # ── 3. Build release artifacts (all platforms, parallel) ─────────────────────
  build-artifacts:
    name: Build (${{ matrix.artifact_suffix }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    continue-on-error: ${{ matrix.os == 'windows-2022' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-amd64
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            artifact_suffix: linux-arm64
            archive_ext: tar.gz
          - os: macos-15
            artifact_suffix: macos-arm64
            archive_ext: tar.gz
          - os: windows-2022
            artifact_suffix: windows-amd64
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup pgrx environment
        uses: ./.github/actions/setup-pgrx

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build extension package
        shell: bash
        run: |
          # Use pgrx-managed pg_config to avoid system PATH ambiguity on Windows.
          PG_CONFIG_PATH="$(cargo pgrx info path pg18)/bin/pg_config"
          # pgrx 0.18 requires the cshim feature on Windows (C macro shims).
          FEATURES="pg18"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            FEATURES="pg18,cshim"
          fi
          cargo pgrx package --pg-config "${PG_CONFIG_PATH}" --features "${FEATURES}"

      - name: Create archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE_NAME="pg_ripple-${VERSION}-pg18-${{ matrix.artifact_suffix }}"
          mkdir -p "dist/${ARCHIVE_NAME}/lib" "dist/${ARCHIVE_NAME}/extension"

          PKG_DIR=$(find target/release -maxdepth 1 -name 'pg_ripple-pg*' -type d | head -1)
          if [[ -z "$PKG_DIR" ]]; then
            echo "ERROR: cannot find pgrx package output in target/release"
            exit 1
          fi

          # Copy shared library (.so on Linux, .dylib on macOS)
          find "${PKG_DIR}" \( -name '*.so' -o -name '*.dylib' \) | while read -r f; do
            cp "$f" "dist/${ARCHIVE_NAME}/lib/"
          done

          # Copy extension control and SQL migration files
          find "${PKG_DIR}" \( -name '*.control' -o -name '*.sql' \) | while read -r f; do
            cp "$f" "dist/${ARCHIVE_NAME}/extension/"
          done

          cp README.md LICENSE "dist/${ARCHIVE_NAME}/" 2>/dev/null || true

          cd dist
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "Archive: ${ARCHIVE_NAME}.tar.gz ($(du -h "${ARCHIVE_NAME}.tar.gz" | cut -f1))"

      - name: Create archive (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $archiveName = "pg_ripple-${version}-pg18-${{ matrix.artifact_suffix }}"
          New-Item -ItemType Directory -Path "dist\${archiveName}\lib" -Force | Out-Null
          New-Item -ItemType Directory -Path "dist\${archiveName}\extension" -Force | Out-Null

          $pkgDir = Get-ChildItem -Path "target\release" -Directory -Filter "pg_ripple-pg*" |
            Select-Object -First 1
          if (-not $pkgDir) {
            Write-Error "Cannot find pgrx package output in target\release"
            exit 1
          }

          # Copy DLL
          Get-ChildItem -Path $pkgDir.FullName -Recurse -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName "dist\${archiveName}\lib\"
          }

          # Copy control + SQL files
          Get-ChildItem -Path $pkgDir.FullName -Recurse -Include "*.control","*.sql" |
            ForEach-Object { Copy-Item $_.FullName "dist\${archiveName}\extension\" }

          Copy-Item README.md, LICENSE "dist\${archiveName}\" -ErrorAction SilentlyContinue
          Compress-Archive -Path "dist\${archiveName}" -DestinationPath "dist\${archiveName}.zip"
          Write-Host "Archive: ${archiveName}.zip"

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: release-${{ matrix.artifact_suffix }}
          path: dist/*.${{ matrix.archive_ext }}
          retention-days: 30
          if-no-files-found: error

  # ── 4. Create GitHub release ─────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [test, regress, build-artifacts]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry for this version
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the block between "## [X.Y.Z]" and the next "## [" heading.
          # sed: print lines from the first version heading to the line before
          # the next heading (or EOF), then strip the heading line itself.
          python3 - <<'EOF'
          import re, sys

          with open("CHANGELOG.md") as f:
              text = f.read()

          version = "${{ steps.version.outputs.version }}"
          # Match the section for this version (heading through next heading or EOF)
          pattern = rf"(## \[{re.escape(version)}\][^\n]*\n)(.*?)(?=\n## \[|\Z)"
          m = re.search(pattern, text, re.DOTALL)
          if not m:
              print(f"ERROR: No changelog entry found for version {version}", file=sys.stderr)
              sys.exit(1)

          # Body is everything after the heading line
          body = m.group(2).strip()
          with open("/tmp/release_notes.md", "w") as out:
              out.write(body + "\n")
          print(f"Extracted {len(body)} chars for v{version}")
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${{ steps.version.outputs.version }}"
          # Derive release name from ROADMAP — look for the version's theme line
          THEME=$(grep -m1 "^## v${VERSION}" ROADMAP.md \
                  | sed 's/^## v[0-9.]* — //' || echo "")
          if [ -n "$THEME" ]; then
            TITLE="${TAG} — ${THEME}"
          else
            TITLE="${TAG}"
          fi
          gh release create "${TAG}" \
            --title "${TITLE}" \
            --notes-file /tmp/release_notes.md \
            --verify-tag

      # v0.51.0 + v0.67.0 SBOM-01 + DS13-03 (v0.86.0): Generate SBOM and verify version.
      # DS13-03: SBOM regeneration is a required step on every tagged release; the
      # version-check step fails the release job if SBOM version doesn't match Cargo.toml.
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOM (CycloneDX)
        run: |
          cargo cyclonedx --format json --override-filename sbom
          echo "Generated SBOM: $(wc -c < sbom.json) bytes"

      - name: Verify SBOM version matches Cargo.toml (v0.67.0 SBOM-01 / DS13-03)
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SBOM_VERSION=$(jq -r '(.metadata.component.version // .version // "") | ltrimstr("v")' sbom.json)
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "SBOM component version: $SBOM_VERSION"
          if [ "$CARGO_VERSION" != "$SBOM_VERSION" ]; then
            echo "ERROR: SBOM version ($SBOM_VERSION) does not match Cargo.toml ($CARGO_VERSION)"
            echo "Regenerate the SBOM or update Cargo.toml before releasing."
            exit 1
          fi
          echo "SBOM version matches Cargo.toml: $CARGO_VERSION"

      - name: Attach SBOM to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "${TAG}" sbom.json --clobber

      - name: Download all platform release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts/
          pattern: release-*
          merge-multiple: false

      - name: Attach platform binaries and checksums to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p release-files
          find artifacts/ -type f \( -name '*.tar.gz' -o -name '*.zip' \) \
            -exec cp {} release-files/ \;
          if [[ -z "$(ls release-files/ 2>/dev/null)" ]]; then
            echo "WARNING: no binary archives found — skipping binary attachment"
          else
            echo "Attaching binary archives:"
            ls -lh release-files/
            cd release-files
            sha256sum * > SHA256SUMS.txt
            cd ..
            gh release upload "${TAG}" release-files/* --clobber
          fi

      # v0.64.0 TRUTH-09: Generate release evidence dashboard artifact.
      - name: Generate release evidence dashboard
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          bash scripts/generate_release_evidence.sh "$VERSION" || true

      - name: Upload release evidence artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: release-evidence-${{ steps.version.outputs.version }}
          path: target/release-evidence/
          if-no-files-found: warn

  # ── 5. Build and publish Docker image ────────────────────────────────────────
  docker:
    name: Docker image (ghcr.io)
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      # docker/metadata-action generates semantic version tags (X.Y.Z, X.Y, latest)
      # and consistent OCI labels.  The annotation-index.* outputs are written onto
      # the multi-arch manifest index so GHCR can link the package to the public
      # repository, unlocking free storage/bandwidth for open-source projects.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ghcr.io/grove/pg-ripple
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=pg_ripple
            org.opencontainers.image.description=PostgreSQL 18 RDF triple store with native SPARQL, SHACL, Datalog, and HTAP
            org.opencontainers.image.vendor=grove
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.documentation=https://github.com/grove/pg-ripple/blob/main/README.md

      - name: Build and push
        id: docker_push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          push: true
          build-args: |
            PGRX_VERSION=${{ env.PGRX_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # annotation-index links the GHCR manifest index to the public repo,
          # enabling free storage/bandwidth for open-source packages.
          outputs: >-
            type=image,
            annotation-index.org.opencontainers.image.source=https://github.com/grove/pg-ripple,
            annotation-index.org.opencontainers.image.description=PostgreSQL 18 RDF triple store with native SPARQL SHACL Datalog and HTAP,
            annotation-index.org.opencontainers.image.licenses=Apache-2.0
          # Cache layers between releases to speed up builds
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          # Embed provenance metadata
          provenance: true
          sbom: true

      # v0.64.0 TRUTH-04: Capture the immutable image digest and verify it
      # matches the scanned digest so the release cannot continue on build failure.
      - name: Capture image digest
        id: digest
        run: |
          DIGEST="${{ steps.docker_push.outputs.digest }}"
          if [[ -z "$DIGEST" ]]; then
            echo "ERROR: docker build/push did not produce a digest — build may have failed" >&2
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Image digest: $DIGEST"

      # v0.60.0 N7-4 / v0.64.0 TRUTH-04: Docker CVE scan — fail release if
      # HIGH/CRITICAL CVEs found. Scan the immutable digest, not the mutable tag.
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/grove/pg-ripple@${{ steps.digest.outputs.digest }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  # ── 6. Build and publish pg_ripple_http Docker image ─────────────────────────
  docker-http:
    name: Docker image — pg_ripple_http (ghcr.io)
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ghcr.io/grove/pg-ripple-http
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=pg_ripple_http
            org.opencontainers.image.description=SPARQL 1.1 Protocol HTTP endpoint for pg_ripple — connects PostgreSQL 18 RDF triple store to the web
            org.opencontainers.image.vendor=grove
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.documentation=https://github.com/grove/pg-ripple/blob/main/pg_ripple_http/README.md

      - name: Build and push
        id: docker_push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          file: Dockerfile.http
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: >-
            type=image,
            annotation-index.org.opencontainers.image.source=https://github.com/grove/pg-ripple,
            annotation-index.org.opencontainers.image.description=SPARQL 1.1 Protocol HTTP endpoint for pg_ripple,
            annotation-index.org.opencontainers.image.licenses=Apache-2.0
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          provenance: true
          sbom: true

      - name: Capture image digest
        id: digest
        run: |
          DIGEST="${{ steps.docker_push.outputs.digest }}"
          if [[ -z "$DIGEST" ]]; then
            echo "ERROR: docker build/push did not produce a digest — build may have failed" >&2
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Image digest: $DIGEST"

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/grove/pg-ripple-http@${{ steps.digest.outputs.digest }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  # ── 7. Publish pg_ripple_http to crates.io ───────────────────────────────────
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Publish pg_ripple_http
        # Only publish when a CARGO_REGISTRY_TOKEN secret is configured.
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        run: cargo publish --package pg_ripple_http --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

