name: Scheduled Fuzz

on:
  schedule:
    # Nightly fuzz run: each target runs for 120 seconds (FUZZ-DURATION-01 v0.75.0).
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      duration:
        description: "Fuzz duration in seconds per target"
        required: false
        default: "3600"

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        target:
          - sparql_parser
          - turtle_parser
          - rdfxml_parser
          - dictionary_hash
          - federation_result
          - datalog_parser
          - shacl_parser
          - jsonld_framer
          - http_request
          - r2rml_mapping
          - geosparql_wkt
          - llm_prompt_builder
          - sparql_update
          - url_host_parser

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust nightly (required for cargo-fuzz)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
          components: rust-src

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: fuzz-cargo-${{ hashFiles('fuzz/Cargo.lock') }}
          restore-keys: |
            fuzz-cargo-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzz target
        working-directory: fuzz
        env:
          DURATION: ${{ github.event.inputs.duration || '120' }}
        run: |
          cargo fuzz run ${{ matrix.target }} -- \
            -max_total_time=${DURATION} \
            -max_len=65536
        # cargo fuzz exits non-zero when it finds a crash or timeout is hit;
        # treat non-zero exit as a failure (the job already fails on non-zero).

      - name: Upload fuzz corpus and crash artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-artifacts-${{ matrix.target }}-${{ github.run_id }}
          path: |
            fuzz/corpus/${{ matrix.target }}/
            fuzz/artifacts/${{ matrix.target }}/
          if-no-files-found: ignore
          retention-days: 30
