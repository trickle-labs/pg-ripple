name: cargo-audit

on:
  # v0.51.0: run on every PR (blocking) and weekly for maintenance.
  # Skip doc-only changes — Cargo.lock cannot change without touching Rust files.
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'blog/**'
      - 'plans/**'
      - 'roadmap/**'
      - 'charts/**'
  schedule:
    # Run weekly on Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: {}

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-audit-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        # SEC-09 (v0.92.0): --deny unmaintained added. All RUSTSEC ignores in
        # audit.toml must have valid expiry dates; if an expiry has passed CI fails.
        # The --deny warnings flag is kept for unsound + yanked; unmaintained adds
        # a third deny category. Existing ignores in audit.toml cover known
        # unmaintained deps (serde_cbor, paste) with explicit expiry dates.
        run: cargo audit --deny warnings --deny unmaintained

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        with:
          script: |
            const title = `Security: cargo audit found vulnerabilities (${new Date().toISOString().split('T')[0]})`;
            const body = `## cargo audit failure\n\nThe weekly \`cargo audit\` job failed.\n\n` +
              `[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n` +
              `Please triage the advisory and update \`Cargo.toml\` or add an \`[advisories]\` ignore entry in \`deny.toml\`.`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'dependencies'],
            });
