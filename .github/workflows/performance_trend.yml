name: Performance Trend

# v0.67.0 BENCH-02: Weekly scheduled performance trend workflow.
# Runs BSBM-like benchmarks, appends results to CSV history files, and
# fails the run if any metric regresses more than 10% vs. the rolling
# 4-week average (or the p95 baselines where available).

on:
  schedule:
    # Run every Monday at 03:00 UTC (off-peak; avoids GH Actions congestion).
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      run_reason:
        description: "Reason for manual trigger (optional)"
        required: false
        default: "manual"

concurrency:
  group: perf-trend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  performance-trend:
    name: Performance Trend (pg18)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PGHOST: localhost
      PGPORT: 28818
      PGUSER: runner
      PGDATABASE: postgres

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Fetch full history so we can append and diff CSV files.
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libssl-dev pkg-config postgresql-client python3

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-pgrx
          key: ${{ runner.os }}-cargo-pgrx-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-pgrx-

      - name: Install cargo-pgrx
        run: |
          if ! command -v cargo-pgrx &>/dev/null; then
            cargo install cargo-pgrx --locked
          fi

      - name: Initialize pgrx for PostgreSQL 18
        run: cargo pgrx init --pg18 download

      - name: Build extension
        run: cargo pgrx install --pg-config ~/.pgrx/18.*/pgrx-install/bin/pg_config

      - name: Start pgrx PostgreSQL 18
        run: cargo pgrx start pg18

      - name: Install extension and baseline data
        run: |
          PGHOST=localhost PGPORT=28818 PGUSER="$USER" PGDATABASE=postgres \
            psql -c "CREATE EXTENSION IF NOT EXISTS pg_ripple;"

      # ── Insert throughput ────────────────────────────────────────────────────
      - name: Benchmark — insert throughput
        id: bench_insert
        run: |
          PGHOST=localhost PGPORT=28818 PGUSER="$USER" PGDATABASE=postgres \
            pgbench -f benchmarks/insert_throughput.sql -t 1 \
            | tee insert_throughput_raw.txt

      # ── Merge throughput ─────────────────────────────────────────────────────
      - name: Benchmark — merge throughput
        id: bench_merge
        run: |
          PGHOST=localhost PGPORT=28818 PGUSER="$USER" PGDATABASE=postgres \
            pgbench -f benchmarks/merge_throughput.sql -t 1 \
            | tee merge_throughput_raw.txt

      # ── SPARQL hybrid search ─────────────────────────────────────────────────
      - name: Benchmark — hybrid search
        id: bench_hybrid
        run: |
          PGHOST=localhost PGPORT=28818 PGUSER="$USER" PGDATABASE=postgres \
            pgbench -f benchmarks/hybrid_search.sql -t 1 \
            | tee hybrid_search_raw.txt

      # ── CDC-02 (v0.91.0): Bidirectional relay throughput ────────────────────
      - name: Benchmark — bidi relay throughput
        id: bench_bidi_relay
        run: |
          PGHOST=localhost PGPORT=28818 PGUSER="$USER" PGDATABASE=postgres \
            pgbench -f benchmarks/bidi_relay_throughput.sql -t 1 \
            | tee bidi_relay_throughput_raw.txt

      # ── Append results to CSV history ───────────────────────────────────────
      - name: Append results to CSV trend files
        run: |
          DATE=$(date -u +%Y-%m-%d) WEEK=$(date -u +%Y-W%V) python3 scripts/bench_append_results.py

      # ── Regression gate against rolling 4-week average ──────────────────────
      - name: Regression gate (4-week rolling average)
        run: python3 scripts/bench_check_regression.py

      # ── Commit updated CSV files back to the repository ─────────────────────
      - name: Commit performance trend data
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/*_history.csv || true
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            git commit -m "chore: append weekly performance trend data [skip ci]"
            git push
          fi

      - name: Upload raw benchmark outputs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: perf-trend-${{ github.run_id }}
          path: |
            insert_throughput_raw.txt
            merge_throughput_raw.txt
            hybrid_search_raw.txt
            bidi_relay_throughput_raw.txt
            benchmarks/*_history.csv
          retention-days: 90

      - name: Stop pgrx PostgreSQL 18
        if: always()
        run: cargo pgrx stop pg18 2>/dev/null || true
