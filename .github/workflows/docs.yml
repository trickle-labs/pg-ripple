name: Publish documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'blog/**'
      - 'CHANGELOG.md'
      - 'ROADMAP.md'
      - 'RELEASE.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --directory=/usr/local/bin

      - name: Install mdbook-admonish
        run: |
          cargo install mdbook-admonish --locked
          cd docs && mdbook-admonish install

      - name: Sync mirrored files
        run: |
          cp CHANGELOG.md docs/src/reference/changelog.md
          cp ROADMAP.md docs/src/reference/roadmap.md
          cp RELEASE.md docs/src/reference/release-process.md
          cp -r blog docs/src/blog

      - name: Fix relative links in mirrored files
        run: |
          # roadmap.md: version detail pages (roadmap/v*.md) live in the repo root
          # but are not part of the mdBook source tree → point to GitHub.
          sed -i 's|](roadmap/|](https://github.com/trickle-labs/pg-ripple/blob/main/roadmap/|g' \
            docs/src/reference/roadmap.md
          # roadmap.md: plans/ files also live outside the docs tree → GitHub.
          sed -i 's|](plans/|](https://github.com/trickle-labs/pg-ripple/blob/main/plans/|g' \
            docs/src/reference/roadmap.md
          # changelog.md: ROADMAP.md (uppercase) → roadmap.md (the local docs page).
          sed -i 's|](ROADMAP\.md)|](roadmap.md)|g' \
            docs/src/reference/changelog.md
          # release-process.md: ROADMAP.md → roadmap.md; AGENTS.md → GitHub.
          sed -i 's|](ROADMAP\.md)|](roadmap.md)|g' \
            docs/src/reference/release-process.md
          sed -i 's|](AGENTS\.md|](https://github.com/trickle-labs/pg-ripple/blob/main/AGENTS.md|g' \
            docs/src/reference/release-process.md

      - name: Build
        run: mdbook build docs

      - name: Build blog posts as standalone pages
        run: |
          mkdir -p /tmp/blog-build/src
          cp docs/src/blog/*.md /tmp/blog-build/src/
          python3 - << 'PYEOF'
          import os
          src = '/tmp/blog-build/src'
          files = sorted(f for f in os.listdir(src)
                         if f.endswith('.md') and f not in ('README.md', 'SUMMARY.md'))
          lines = ['# Summary\n', '\n', '[Blog Index](README.md)\n', '\n']
          for f in files:
              title = f
              with open(os.path.join(src, f)) as fp:
                  for line in fp:
                      stripped = line.strip()
                      if stripped.startswith('# '):
                          title = stripped.lstrip('# ').strip()
                          break
              lines.append(f'- [{title}]({f})\n')
          with open(os.path.join(src, 'SUMMARY.md'), 'w') as fp:
              fp.writelines(lines)
          PYEOF
          cat > /tmp/blog-build/book.toml << 'EOF'
          [book]
          src = "src"
          language = "en"
          [output.html]
          site-url = "/pg-ripple/blog/"
          default-theme = "navy"
          EOF
          mdbook build /tmp/blog-build
          cp -r /tmp/blog-build/book/. docs/book/blog/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5
        with:
          path: docs/book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5
