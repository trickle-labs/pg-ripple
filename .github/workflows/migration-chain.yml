name: Migration Chain

# BUILD-02 (v0.91.0): Dedicated migration chain workflow.
#
# Runs the full SQL migration chain test on every PR and push to main.
# Ensures that ALTER EXTENSION pg_ripple UPDATE works end-to-end from the
# earliest shipped version to the current default_version.
#
# Uses the same PGDG + pgrx setup as the "migration" job in ci.yml.

on:
  push:
    branches: [main]
    paths:
      - 'sql/**.sql'
      - 'pg_ripple.control'
      - 'tests/test_migration_chain.sh'
  pull_request:
    branches: [main]
    paths:
      - 'sql/**.sql'
      - 'pg_ripple.control'
      - 'tests/test_migration_chain.sh'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  PGRX_VERSION: "0.18.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migration-chain:
    name: Migration chain — full upgrade path (BUILD-02, v0.91.0)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses:         uses:         uses:         uses:         uses:         uses:         uses:         uses:               uses:       ust        uses:         uses:         uses:         uses: tabl        uses:         uses:         uses:         uses:         usesd5c        uses:         uses:         uses:         uses:         uses: : |
        uses:         uses:         uses:         uses:              uses:         uses:         uses:         uses:          ('**/Car    ock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache cargo-pgrx binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cargo/bin/cargo-pg          path: ~/.cargo/bin/cargo-pgrgo          path: ~/.VER   N           path: ~/.cstall P          path: ~/.carg            path: ~/.cargo/bin/cargo-pg  tall     -n          path: ~nd          path: ~/.cargo/bin/cargo-pg          path: ~/.cargo/bin/sh          path: ~/.carggdg
          cu          cu         po          cu          cu         po          cu          cu         po          cu          cu         po          cu          cu         po          cu          cu         po          cu          cu         po          cu          cu         po          cu          cu         po          cu          cu /apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libclang-dev clang lld \
            postgresql-18 postgresql-server-dev-18
          sudo chown -R "$USER" \
            /usr/share/postgresql/18/extension \
            /usr/lib/postgresql            /usr/lib/postgresql            /usr/lib/postgresql            /usr/lib/postgresql            /usr/lib/postgresql            /usr/lib/postgresql            /usr/lib/postgresql            /usr/lib/postgresql            /usr/lib/postgresql            /usr/lib/postgresql            /usr/lib/postgresql       t --pg18 /usr/lib/postgresql/18/bin/pg_config

      - name: Start pgrx PostgreSQL 18
        run: cargo pgrx start pg18 --postgresql-conf "allow_system_table_mods=on"

      - name: Run migration chain test
        run: bash tests/test_migration_chain.sh

      - name: Stop pgrx PostgreSQL 18
        if: always()
        run: cargo pgrx stop pg18
